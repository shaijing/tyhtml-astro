name: publish

# Triggered when a version tag is pushed (e.g. `git tag v0.1.3 && git push --tags`).
# Runs typecheck + tests against the tagged commit, then publishes to npm with provenance.

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        # `id-token: write` enables npm provenance via OIDC.
        # `contents: read` is the default; explicit for clarity.
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Typecheck
              run: bunx tsc --noEmit

            - name: Test
              run: bun test

            - name: Publish to npm
              # Auth happens via Trusted Publisher (OIDC) — the GitHub repo +
              # workflow file are bound to the npm package in the npm UI, so
              # `id-token: write` above lets `npm` fetch a short-lived token
              # automatically. No NPM_TOKEN secret needed.
              # `publishConfig.access = public` in package.json handles the
              # public access flag; `--provenance` attaches the GitHub
              # Actions build attestation to the published version.
              run: npm publish --provenance